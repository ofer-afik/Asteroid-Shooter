name: Build Asteroid Shooter

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
      - name: Build Linux executable
        run: |
          python -m PyInstaller --onefile code/game.py --name AsteroidShooter
      - name: Package Linux executable
        run: |
          cat > run-asteroid-shooter.sh <<'EOF'
          #!/bin/bash
          DIR="$(mktemp -d)"
          BINARY="$DIR/AsteroidShooter"
          tail -n +$(grep -n '^# BINARY START' "$0" | cut -d: -f1) "$0" | base64 -d > "$BINARY"
          chmod +x "$BINARY"
          if command -v x-terminal-emulator >/dev/null 2>&1; then
              exec x-terminal-emulator -e "$BINARY"
          elif command -v gnome-terminal >/dev/null 2>&1; then
              exec gnome-terminal -- "$BINARY"
          elif command -v konsole >/dev/null 2>&1; then
              exec konsole -e "$BINARY"
          elif command -v xfce4-terminal >/dev/null 2>&1; then
              exec xfce4-terminal -e "$BINARY"
          elif command -v xterm >/dev/null 2>&1; then
              exec xterm -e "$BINARY"
          else
              exec "$BINARY"
          fi
          rm -rf "$DIR"
          exit
          # BINARY START
          EOF
          base64 dist/AsteroidShooter >> run-asteroid-shooter.sh
          chmod +x run-asteroid-shooter.sh
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: run-asteroid-shooter.sh

  build-macos:
    name: Build macOS .app bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
      - name: Build macOS executable
        run: |
          python -m PyInstaller --onefile code/game.py --name AsteroidShooter
      - name: Create .app bundle
        run: |
          mkdir -p AsteroidShooter.app/Contents/MacOS
          mkdir -p AsteroidShooter.app/Contents/Resources
          cp dist/AsteroidShooter AsteroidShooter.app/Contents/Resources/AsteroidShooter
          cat > AsteroidShooter.app/Contents/MacOS/AsteroidShooter <<'APPWRAP'
          #!/bin/bash
          BUNDLE_DIR="$(cd "$(dirname "$0")/../Resources" && pwd)"
          osascript <<'APPLESCRIPT'
          tell application "Terminal"
            activate
            do script "cd \"$BUNDLE_DIR\" && ./AsteroidShooter"
          end tell
          APPLESCRIPT
          APPWRAP
          chmod +x AsteroidShooter.app/Contents/MacOS/AsteroidShooter
          cat > AsteroidShooter.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Asteroid Shooter</string>
            <key>CFBundleDisplayName</key>
            <string>Asteroid Shooter</string>
            <key>CFBundleExecutable</key>
            <string>AsteroidShooter</string>
            <key>CFBundleIdentifier</key>
            <string>com.github.asteroidshooter</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          PLIST
          echo "APPL????" > AsteroidShooter.app/Contents/PkgInfo
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            AsteroidShooter.app/

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller windows-curses
      - name: Build Windows executable
        run: |
          python -m PyInstaller --onefile code/game.py --name AsteroidShooter
      - name: Create Windows launcher
        run: |
          echo @echo off > run-asteroid-shooter.cmd
          echo "%~dp0AsteroidShooter.exe" >> run-asteroid-shooter.cmd
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/AsteroidShooter.exe
            run-asteroid-shooter.cmd
