name: Build Game Executables

on:
  push:
    tags:
      - 'v*'   # Triggers when you push a tag like v1.0, v1.0.1, etc.

jobs:
  build:
    # Run the same job on three different operating systems
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output_name: asteroid-shooter-linux
          - os: windows-latest
            output_name: asteroid-shooter-windows.exe
          - os: macos-latest
            output_name: asteroid-shooter-mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download your code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install windows-curses (Windows only)
        if: runner.os == 'Windows'
        run: pip install windows-curses

      - name: Build the executable
        run: pyinstaller --onefile --name ${{ matrix.output_name }} code/game.py
        shell: bash

      - name: Upload the result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}